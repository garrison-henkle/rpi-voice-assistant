services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    networks:
      - stack
    volumes:
      - ollama-models:/root/.ollama
      - ./models:/models:ro
    # probe daemon via /bin/ollama list; curl is not in the ollama image
    healthcheck:
      test: ["CMD", "/bin/ollama", "list"]
      interval: 10s
      retries: 15
      start_period: 90s

  piper:
    build:
      context: https://github.com/OHF-Voice/piper1-gpl.git#refs/tags/v1.5.0
      dockerfile: Dockerfile
    container_name: piper
    networks:
      - stack
    # We override the upstream ENTRYPOINT and run a small shell wrapper
    # that fetches `PIPER_VOICE` (via download_voices OR direct HF fetch
    # for voices not in piper1-gpl's bundled URL map), then execs the
    # http_server wrapped with that voice. The wrapper lives in
    # `scripts/piper-start.sh` so we don't have to escape `${VAR}` past
    # both Compose and `/bin/sh`.
    volumes:
      - ./scripts/piper-start.sh:/usr/local/bin/piper-start.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/piper-start.sh"]
    environment:
      PIPER_VOICE: en_US-hfc_male-medium
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/info')\""]
      interval: 15s
      retries: 10
      start_period: 120s

  rpi-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rpi-assistant
    depends_on:
      ollama:
        condition: service_healthy
      piper:
        condition: service_healthy
    networks:
      - stack
    # Reachable from the satellite over the docker bridge (service name
    # `rpi-assistant`); host-side curl is also nice for debugging.
    ports:
      - "6059:6059/tcp"
    environment:
      RPI_ASSISTANT_HTTP_PORT: "6059"
      RPI_LLM_BASE_URL: "http://ollama:11434"
      RPI_LLM_MODEL: "qwen3-nest-mini"
      RPI_TTS_BASE_URL: "http://piper:5000"
      RPI_TTS_VOICE: "en_US-hfc_male-medium"
    restart: unless-stopped

  assistant-satellite:
    build:
      context: ./satellite
      dockerfile: Dockerfile
    container_name: assistant-satellite
    depends_on:
      rpi-assistant:
        condition: service_started
    networks:
      - stack
    # Bind PulseAudio over the user's socket so we can read/write the host mic
    # and speakers; user/group match the host's audio-user.
    group_add: [audio]
    cap_add:
      - SYS_NICE
    volumes:
      - /run/user/${SATELLITE_USER_ID:-1000}:/run/user/${SATELLITE_USER_ID:-1000}
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    devices:
      - /dev/snd
    environment:
      RPI_ASST_BASE_URL:  "http://rpi-assistant:6059"
      SAT_WAKE_TH_WORD:   "hey_rhasspy"
      SAT_WAKE_THRESHOLD: "0.5"
      SAT_SAMPLE_RATE:    "16000"
      SAT_VAD_RMS_QUIET:  "200"
      SAT_VAD_QUIET_FRAMES: "12"
      # SAT_OUTPUT_DEVICE controls the playback sink the satellite picks at
      # boot. The auto-pick prefers the first 16 kHz stereo output the host
      # exposes (currently the reSpeaker XVF3800's analog output on hw:0,0).
      #
      # - "default" / unset  → OS default (ALSA dmixer)
      # - "pulse"             → route through the host's PipeWire Pulse
      #                        bridge (/run/user/1000/pulse/native). This
      #                        is what we want when the default BT sink is
      #                        a paired Sonos — pipewire routes us to it.
      # - "plughw:0,0"        → bypass plugins, force hw:0,0 (reSpeaker jack)
      # - numeric id          → e.g. 0, 6
      # - substring           → e.g. "reSpeaker", "hdmi"
      SAT_OUTPUT_DEVICE:   "pulse"
      SAT_DEBUG:          "0"
    restart: unless-stopped

networks:
  stack:
    driver: bridge

volumes:
  ollama-models:
