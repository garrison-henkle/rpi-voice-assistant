services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    network_mode: host
    volumes:
      - ollama-models:/root/.ollama
      - ./models:/models:ro
    # probe daemon via /bin/ollama list; curl is not in the ollama image
    healthcheck:
      test: ["CMD", "/bin/ollama", "list"]
      interval: 10s
      retries: 15
      start_period: 90s

  piper:
    build:
      context: https://github.com/OHF-Voice/piper1-gpl.git#refs/tags/v1.5.0
      dockerfile: Dockerfile
    container_name: piper
    network_mode: host
    # Exit the upstream ENTRYPOINT ["piper"] and run a pipeline instead.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        python3 -m piper.download_voices ${PIPER_VOICE:-en_US-lessac-medium} --data-dir /data && \
        exec python3 -m piper.http_server --host 0.0.0.0 --port 5000 \
          -m ${PIPER_VOICE:-en_US-lessac-medium} --data-dir /data
    environment:
      PIPER_VOICE: en_US-lessac-medium
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/info')\""]
      interval: 15s
      retries: 10
      start_period: 120s

  faster-whisper:
    image: systran/faster-whisper-server:latest
    container_name: faster-whisper
    # 22050 Haar default; we override the model + language below.
    networks:
      - stack
    command:
      - "--model"
      - "base.en"
      - "--language"
      - "en"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "10300"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:10300/v1/models')\""]
      interval: 15s
      retries: 10
      start_period: 120s

  rpi-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rpi-assistant
    depends_on:
      ollama:
        condition: service_healthy
      piper:
        condition: service_healthy
      faster-whisper:
        condition: service_healthy
    networks:
      - stack
    # Reachable from the satellite over the docker bridge (service name
    # `rpi-assistant`); host-side curl is also nice for debugging.
    ports:
      - "6059:6059/tcp"
    environment:
      RPI_ASSISTANT_HTTP_PORT: "6059"
      RPI_LLM_BASE_URL: "http://ollama:11434"
      RPI_LLM_MODEL: "qwen3-nest-mini"
      RPI_TTS_BASE_URL: "http://localhost:5000"
      RPI_TTS_VOICE: "en_US-lessac-medium"
    restart: unless-stopped

  assistant-satellite:
    build:
      context: ./satellite
      dockerfile: Dockerfile
    container_name: assistant-satellite
    depends_on:
      rpi-assistant:
        condition: service_started
      faster-whisper:
        condition: service_healthy
    networks:
      - stack
    # Bind PulseAudio over the user's socket so we can read/write the host mic
    # and speakers; user/group match the host's audio-user.
    group_add: [audio]
    cap_add:
      - SYS_NICE
    volumes:
      - /run/user/${SATELLITE_USER_ID:-1000}:/run/user/${SATELLITE_USER_ID:-1000}
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    devices:
      - /dev/snd
    environment:
      RPI_ASST_BASE_URL:  "http://rpi-assistant:6059"
      WHISPER_BASE_URL:   "http://faster-whisper:10300"
      SAT_WAKE_TH_WORD:   "hey_jarvis"
      SAT_WAKE_THRESHOLD: "0.5"
      SAT_SAMPLE_RATE:    "16000"
      SAT_VAD_RMS_QUIET:  "200"
      SAT_VAD_QUIET_FRAMES: "12"
      SAT_SPK_DEVICE:     "default"
      SAT_DEBUG:          "0"
    restart: unless-stopped

networks:
  stack:
    driver: bridge

volumes:
  ollama-models:
