services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    networks:
      - stack
    # Keep the qwen3 weights resident in RAM between requests — without
    # this ollama unloads after 5 min idle and the first wake of a new
    # conversation pays a cold-load tax of 6–10 s. 30 m covers a normal
    # kitchen / office usage session.
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
      OLLAMA_NUM_PARALLEL: "1"
    volumes:
      - ollama-models:/root/.ollama
      - ./models:/models:ro
    # probe daemon via /bin/ollama list; curl is not in the ollama image
    healthcheck:
      test: ["CMD", "/bin/ollama", "list"]
      interval: 10s
      retries: 15
      start_period: 90s

  piper:
    build:
      context: https://github.com/OHF-Voice/piper1-gpl.git#refs/tags/v1.5.0
      dockerfile: Dockerfile
    container_name: piper
    networks:
      - stack
    # We override the upstream ENTRYPOINT and run a small shell wrapper
    # that fetches `PIPER_VOICE` (via download_voices OR direct HF fetch
    # for voices not in piper1-gpl's bundled URL map), then execs the
    # http_server wrapped with that voice. The wrapper lives in
    # `scripts/piper-start.sh` so we don't have to escape `${VAR}` past
    # both Compose and `/bin/sh`.
    volumes:
      - ./scripts/piper-start.sh:/usr/local/bin/piper-start.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/piper-start.sh"]
    environment:
      PIPER_VOICE: en_US-hfc_male-medium
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/info')\""]
      interval: 15s
      retries: 10
      start_period: 120s

  rpi-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rpi-assistant
    depends_on:
      ollama:
        condition: service_healthy
      piper:
        condition: service_healthy
    networks:
      - stack
    # Reachable from the satellite over the docker bridge (service name
    # `rpi-assistant`); host-side curl is also nice for debugging.
    ports:
      - "6059:6059/tcp"
    environment:
      RPI_ASSISTANT_HTTP_PORT: "6059"
      RPI_LLM_BASE_URL: "http://ollama:11434"
      RPI_LLM_MODEL: "qwen3-nest-mini"
      RPI_TTS_BASE_URL: "http://piper:5000"
      RPI_TTS_VOICE: "en_US-hfc_male-medium"
    restart: unless-stopped

  assistant-satellite:
    build:
      context: ./satellite
      dockerfile: Dockerfile
    container_name: assistant-satellite
    depends_on:
      rpi-assistant:
        condition: service_started
    networks:
      - stack
    # Bind PulseAudio over the user's socket so we can read/write the host mic
    # and speakers; user/group match the host's audio-user.
    group_add: [audio]
    cap_add:
      - SYS_NICE
    volumes:
      - /run/user/${SATELLITE_USER_ID:-1000}:/run/user/${SATELLITE_USER_ID:-1000}
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /run/dbus:/run/dbus:ro
    devices:
      - /dev/snd
    environment:
      RPI_ASST_BASE_URL:  "http://rpi-assistant:6059"
      SAT_WAKE_TH_WORD:   "hey_rhasspy"
      SAT_WAKE_THRESHOLD: "0.5"
      SAT_SAMPLE_RATE:    "16000"
      SAT_VAD_RMS_QUIET:  "200"
      # 8 frames × 80 ms = 640 ms of trailing silence before the satellite
      # treats the user as done. At 12 (the old default) we sat 960 ms
      # after the last word waiting for noise that never came, eating
      # ~320 ms of perceived end-to-end latency. moonshine is robust to
      # trailing silence so dropping to 8 is safe in practice.
      SAT_VAD_QUIET_FRAMES: "8"
      # SAT_OUTPUT_DEVICE picks the playback sink. Empty / "auto" lets the
      # satellite decide at boot:
      #   1. Probe bluealsa (BT sink paired + connected?) → use if alive.
      #   2. Else first 16 kHz stereo output (USB reSpeaker or HDMI).
      #   3. Else ALSA "default".
      # This makes the satellite work with both wired speakers and a paired
      # Sonos without an env-var edit — just pair a Sonos to switch routes.
      #
      # You can override the auto-pick with one of:
      # - "bluealsa"          → force BT path (fails if not alive)
      # - "pulse"             → force the PipeWire / PulseAudio bridge
      # - "default" / "alsa"  → force the host's default ALSA PCM
      # - "plughw:0,0"        → bypass plugins, force hw:0,0 (reSpeaker jack)
      # - numeric id          → e.g. 0, 6
      # - substring           → e.g. "reSpeaker", "hdmi"
      SAT_OUTPUT_DEVICE:   "auto"
      # MAC of the BT sink (e.g. Sonos) — substituted into /etc/asound.conf
      # at boot. Set to whatever the Sonos reports in `bluetoothctl devices`.
      SONOS_BT_MAC:        "74:CA:60:A6:F3:F8"
      SAT_DEBUG:          "0"
    restart: unless-stopped

networks:
  stack:
    driver: bridge

volumes:
  ollama-models:
