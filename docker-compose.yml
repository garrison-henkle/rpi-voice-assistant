services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    network_mode: host
    volumes:
      - ollama-models:/root/.ollama
      - ./models:/models:ro
    # The official ollama image is minimal and does not ship curl, so a
    # `curl http://127.0.0.1:11434/api/tags` healthcheck fails with
    # `executable not found` even when the daemon is healthy. CLI is always
    # available, so probe the daemon via `/bin/ollama list` instead.
    healthcheck:
      test: ["CMD", "/bin/ollama", "list"]
      interval: 10s
      retries: 15
      start_period: 90s

  piper:
    build:
      context: https://github.com/OHF-Voice/piper1-gpl.git#refs/tags/v1.5.0
      dockerfile: Dockerfile
    container_name: piper
    network_mode: host
    # piper1-gpl's Dockerfile sets ENTRYPOINT ["piper"], so a `command:` of
    # `sh -c "..."` becomes `piper sh ...`, which the piper CLI parses as
    # an unknown subcommand. Override the entrypoint to /bin/sh and put the
    # full pipeline in `command:`.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        python3 -m piper.download_voices ${PIPER_VOICE:-en_US-lessac-medium} --data-dir /data && \
        exec python3 -m piper.http_server --host 0.0.0.0 --port 5000 \
           -m ${PIPER_VOICE:-en_US-lessac-medium} --data-dir /data
    environment:
      PIPER_VOICE: en_US-lessac-medium
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/info').status==200 else 1)"]
      interval: 15s
      retries: 10
      start_period: 120s

  rpi-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rpi-assistant
    depends_on:
      ollama:
        condition: service_healthy
      piper:
        condition: service_healthy
    ports:
      - "6053:6053/tcp"
    environment:
      RPI_ORCHESTRATOR_PORT: 6053
      RPI_LLM_BASE_URL: http://localhost:11434
      RPI_LLM_MODEL: "qwen3-nest-mini"
      RPI_TTS_BASE_URL: http://localhost:5000
      RPI_TTS_VOICE: "en_US-lessac-medium"
    restart: unless-stopped

  linux-voice-assistant:
    image: ghcr.io/ohf-voice/linux-voice-assistant:latest
    container_name: linux-voice-assistant
    network_mode: host
    user: "${LVA_USER_ID:-1000}:${LVA_USER_GROUP:-1000}"
    group_add: [audio]
    cap_add: [SYS_NICE]
    env_file: .env
    volumes:
      - lva-wakeword-data:/app/local
      - lva-wakeword-custom:/app/wakewords/custom
      - lva-configuration:/app/configuration
      - lva-sounds-custom:/app/sounds/custom
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /run/user/${LVA_USER_ID:-1000}:/run/user/${LVA_USER_ID:-1000}
    depends_on:
      rpi-assistant:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "linux_voice_assistant"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

volumes:
  ollama-models:
  lva-wakeword-data:
  lva-wakeword-custom:
  lva-configuration:
  lva-sounds-custom:
