apply:
  - ../kotlin.module-template.yaml

# The kotlin-serialization compiler plugin is registered at project level
# in `../project.yaml`; this module inherits it because it's listed in the
# `plugins:` block there.

product:
  type: jvm/app
  platforms: [ jvm ]

settings:
  jvm:
    mainClass: dev.henkle.rpi.assistant.AssistantKt

dependencies:
  # Koog's transitive tree drags in tinylog + slf4j-simple, which fight each
  # other (and Logback) for the SLF4J slot. Exclude them so Logback is the
  # sole provider on the classpath.
  - $libs.koog.agents:
      exclude:
        - "org.tinylog:tinylog-api"
        - "org.tinylog:tinylog-impl"
        - "org.slf4j:slf4j-simple"
  - $libs.koog.prompt.executor.ollama:
      exclude:
        - "org.tinylog:tinylog-api"
        - "org.tinylog:tinylog-impl"
        - "org.slf4j:slf4j-simple"
  - $libs.onnxruntime
  - $libs.kotlinx.coroutines.core
  - $libs.kotlinx.serialization.json

  - $libs.ktor.client.cio
  - $libs.ktor.client.content.negotiation
  - $libs.ktor.serialization.kotlinx.json

  - $libs.ktor.server.core
  - $libs.ktor.server.netty
  - $libs.ktor.server.content.negotiation
  - $libs.ktor.server.status.pages

  - $libs.logback.classic

test-dependencies@jvm:
  - $kotlin.test.junit5
